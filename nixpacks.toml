# Railway / Nixpacks: сборка из корня репозитория
# Сборка веб-приложения (web/requirements.txt)

[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = ["python -m pip install -r web/requirements.txt"]

[phases.build]
cmds = ["mkdir -p /app/data", "cp data/users.json /app/data/users.json 2>/dev/null || echo 'No users.json to copy'"]

[start]
cmd = "cd web && gunicorn -b 0.0.0.0:$PORT app:app"
