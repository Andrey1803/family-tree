<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка сохранения из браузера</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🧪 Проверка сохранения дерева из браузера</h1>
    
    <div>
        <button onclick="testLogin()">1. Войти</button>
        <button onclick="testSession()">2. Проверить сессию</button>
        <button onclick="testSave()">3. Сохранить дерево</button>
        <button onclick="testLoad()">4. Загрузить дерево</button>
        <button onclick="testAll()">🚀 Запустить все тесты</button>
    </div>
    
    <div id="results"></div>

    <script>
        const BASE_URL = window.location.origin;
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
            console.log(message);
        }

        async function testLogin() {
            log('Вход...');
            try {
                const resp = await fetch(`${BASE_URL}/api/auth/login-local`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'same-origin',
                    body: JSON.stringify({login: 'Тестовый Пользователь', password: 'test123456'})
                });
                const data = await resp.json();
                log(`Вход: ${resp.status} - ${JSON.stringify(data)}`, resp.ok ? 'success' : 'error');
                return resp.ok;
            } catch (e) {
                log(`Вход ошибка: ${e.message}`, 'error');
                return false;
            }
        }

        async function testSession() {
            log('Проверка сессии...');
            try {
                const resp = await fetch(`${BASE_URL}/api/check-session`, {
                    credentials: 'same-origin'
                });
                const data = await resp.json();
                log(`Сессия: ${resp.status} - username: ${data.username || 'null'}`, data.username ? 'success' : 'info');
                return !!data.username;
            } catch (e) {
                log(`Сессия ошибка: ${e.message}`, 'error');
                return false;
            }
        }

        async function testSave() {
            log('Сохранение дерева...');
            try {
                const tree = {
                    persons: {p1: {id: 'p1', name: 'Тест', surname: 'Тестов'}},
                    marriages: [],
                    current_center: 'p1'
                };
                const resp = await fetch(`${BASE_URL}/api/tree`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'same-origin',
                    body: JSON.stringify(tree)
                });
                const data = await resp.json();
                log(`Сохранение: ${resp.status} - ${JSON.stringify(data)}`, resp.ok ? 'success' : 'error');
                return resp.ok;
            } catch (e) {
                log(`Сохранение ошибка: ${e.message}`, 'error');
                return false;
            }
        }

        async function testLoad() {
            log('Загрузка дерева...');
            try {
                const resp = await fetch(`${BASE_URL}/api/tree`, {
                    credentials: 'same-origin'
                });
                const data = await resp.json();
                const count = data.persons ? Object.keys(data.persons).length : 0;
                log(`Загрузка: ${resp.status} - персон: ${count}`, resp.ok ? 'success' : 'error');
                return resp.ok;
            } catch (e) {
                log(`Загрузка ошибка: ${e.message}`, 'error');
                return false;
            }
        }

        async function testAll() {
            document.getElementById('results').innerHTML = '';
            log('=== ЗАПУСК ВСЕХ ТЕСТОВ ===', 'info');
            
            const loginOk = await testLogin();
            if (!loginOk) return;
            
            const sessionOk = await testSession();
            if (!sessionOk) return;
            
            const saveOk = await testSave();
            if (!saveOk) return;
            
            const loadOk = await testLoad();
            
            log('=== ИТОГИ ===', 'info');
            log(`Все тесты ${loadOk ? 'пройдены ✅' : 'частично пройдены ⚠️'}`, loadOk ? 'success' : 'info');
        }

        // Автозапуск при загрузке страницы
        window.onload = () => {
            log('Страница загружена. Нажмите кнопку для теста.', 'info');
            log(`API URL: ${BASE_URL}/api/tree`, 'info');
        };
    </script>
</body>
</html>
