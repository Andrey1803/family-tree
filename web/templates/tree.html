<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e40af">
    <title>Семейное древо — {{ username }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>
<body data-is-admin="{{ 'true' if username == 'admin' else 'false' }}">
    <header class="tree-header">
        <h1>Семейное древо</h1>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Меню" style="display:none">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="tree-menubar" id="tree-menubar">
            <div class="menu-item">
                <span class="menu-label">Файл</span>
                <div class="menu-dropdown">
                    <button type="button" data-action="new">Новый</button>
                    <button type="button" data-action="save">Сохранить</button>
                    <hr>
                    <button type="button" data-action="export-csv">Экспорт в CSV</button>
                    <button type="button" data-action="export-pdf">Экспорт в PDF</button>
                    <button type="button" data-action="import-csv">Импорт из CSV</button>
                    <hr>
                    <button type="button" data-action="backup-create">Создать резервную копию</button>
                    <button type="button" data-action="backup-list">Управление копиями</button>
                    <hr>
                    <a href="{{ url_for('logout') }}">Выход</a>
                </div>
            </div>
            <div class="menu-item">
                <span class="menu-label">Вид</span>
                <div class="menu-dropdown">
                    <button type="button" data-action="refresh">Обновить</button>
                    <hr>
                    <button type="button" data-action="filters">Фильтры</button>
                    <hr>
                    <button type="button" data-action="color-palette">Цвет интерфейса...</button>
                    <hr>
                    <button type="button" data-action="timeline">📅 Временная шкала</button>
                </div>
            </div>
            <div class="menu-item">
                <span class="menu-label">Правка</span>
                <div class="menu-dropdown">
                    <button type="button" data-action="undo">Отмена</button>
                    <button type="button" data-action="redo">Повтор</button>
                    <hr>
                    <button type="button" data-action="search">Найти</button>
                </div>
            </div>
            <div class="menu-item">
                <span class="menu-label">Справка</span>
                <div class="menu-dropdown">
                    <button type="button" data-action="stats">Статистика дерева</button>
                    <hr>
                    <button type="button" data-action="about-dev">О разработчике</button>
                    <button type="button" data-action="about">О программе</button>
                </div>
            </div>
        </nav>
        <div class="tree-header-right">
            <a href="{{ url_for('download_exe') }}" id="btn-download-exe" class="btn-pwa-install" style="display:none" title="Распакуйте архив и запустите Семейное_древо.exe">Скачать приложение (Tree.zip)</a>
            <button type="button" class="btn-pwa-open" id="btn-pwa-open" style="display:none" title="Запустите приложение и выберите Файл → Зарегистрировать протокол">Открыть в приложении</button>
            <span class="desktop-app-hint" id="desktop-app-hint" style="display:none">Приложение установлено?</span>
            <a href="{{ url_for('admin_panel') }}" class="btn-admin" id="btn-admin" title="Админ-панель" style="display:none">👑 Админ</a>
            <span class="user">{{ username }}</span>
            <a href="{{ url_for('logout') }}">Выйти</a>
        </div>
    </header>
    <input type="file" id="import-csv-input" accept=".csv" style="display:none">
    <main class="tree-container">
        <div id="tree-root"></div>
        <div class="empty-tree" id="empty-msg" style="display:none;">
            <p>Дерево пусто.</p>
            <button type="button" class="btn-add-first" id="btn-add-first">Добавить первую персону</button>
        </div>
    </main>
    <footer class="tree-statusbar">
        <span id="status-center">Центр: не выбран</span>
        <span id="status-msg"></span>
    </footer>
    
    <!-- Hamburger menu toggle script -->
    <script>
    // Показываем hamburger-кнопку только на мобильных
    function updateHamburgerVisibility() {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const menubar = document.getElementById('tree-menubar');
        if (window.innerWidth <= 480) {
            hamburgerBtn.style.display = 'flex';
        } else {
            hamburgerBtn.style.display = 'none';
            menubar.classList.remove('open');
            hamburgerBtn.classList.remove('active');
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const menubar = document.getElementById('tree-menubar');
        
        // Инициализация видимости
        updateHamburgerVisibility();
        
        // Переключение меню
        hamburgerBtn.addEventListener('click', function() {
            menubar.classList.toggle('open');
            hamburgerBtn.classList.toggle('active');
        });
        
        // Закрытие меню при клике вне его
        document.addEventListener('click', function(e) {
            if (!menubar.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                menubar.classList.remove('open');
                hamburgerBtn.classList.remove('active');
            }
        });
        
        // Закрытие меню при выборе пункта
        const menuItems = menubar.querySelectorAll('.menu-dropdown button, .menu-dropdown a');
        menuItems.forEach(function(item) {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 480) {
                    menubar.classList.remove('open');
                    hamburgerBtn.classList.remove('active');
                }
            });
        });
        
        // Пересчёт при изменении размера окна
        window.addEventListener('resize', updateHamburgerVisibility);
    });
    </script>
    
    <script src="{{ url_for('static', filename='js/undo.js') }}?v=20260301-2"></script>
    <script src="{{ url_for('static', filename='js/tree.js') }}?v=20260301-2"></script>
</body>
</html>
