            <button type="button" class="btn-pwa-open" id="btn-pwa-open" style="display:none" title="Запустите приложение и выберите Файл → Зарегистрировать протокол">Открыть в приложении</button>

    </header>
    <input type="file" id="import-csv-input" accept=".csv" style="display:none">
    <main class="tree-container">
        <div id="tree-root"></div>
        <div class="empty-tree" id="empty-msg" style="display:none;">
            <p>Дерево пусто.</p>
            <button type="button" class="btn-add-first" id="btn-add-first">Добавить первую персону</button>
        </div>
    </main>
    <footer class="tree-statusbar">
        <span id="status-stats">📊 Персон: 0 | Браков: 0</span>
        <span id="status-center">Центр: не выбран</span>
        <span id="status-msg"></span>
    </footer>
    
    <!-- Hamburger menu toggle script -->
    <script>
    // Показываем hamburger-кнопку только на мобильных
    function updateHamburgerVisibility() {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const menubar = document.getElementById('tree-menubar');
        if (window.innerWidth <= 480) {
            hamburgerBtn.style.display = 'flex';
        } else {
            hamburgerBtn.style.display = 'none';
            menubar.classList.remove('open');
            hamburgerBtn.classList.remove('active');
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const menubar = document.getElementById('tree-menubar');
        
        // Инициализация видимости
        updateHamburgerVisibility();
        
        // Переключение меню
        hamburgerBtn.addEventListener('click', function() {
            menubar.classList.toggle('open');
            hamburgerBtn.classList.toggle('active');
        });
        
        // Закрытие меню при клике вне его
        document.addEventListener('click', function(e) {
            if (!menubar.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                menubar.classList.remove('open');
                hamburgerBtn.classList.remove('active');
            }
        });
        
        // Закрытие меню при выборе пункта
        const menuItems = menubar.querySelectorAll('.menu-dropdown button, .menu-dropdown a');
        menuItems.forEach(function(item) {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 480) {
                    menubar.classList.remove('open');
                    hamburgerBtn.classList.remove('active');
                }
            });
        });
        
        // Пересчёт при изменении размера окна
        window.addEventListener('resize', updateHamburgerVisibility);
    });

    // === HEARTBEAT: Отправка подтверждения активности каждую минуту ===
    let heartbeatInterval = null;

    function startHeartbeat() {
        // Отправляем heartbeat сразу при загрузке
        sendHeartbeat();
        
        // Затем отправляем каждую минуту (60000 мс)
        heartbeatInterval = setInterval(sendHeartbeat, 60000);
        
        console.log('[HEARTBEAT] Started');
    }

    function sendHeartbeat() {
        fetch('/api/heartbeat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'same-origin'
        })
        .then(response => {
            if (response.ok) {
                console.log('[HEARTBEAT] OK at', new Date().toLocaleTimeString());
            } else {
                console.warn('[HEARTBEAT] Failed:', response.status);
            }
        })
        .catch(error => {
            console.warn('[HEARTBEAT] Error:', error);
        });
    }

    function stopHeartbeat() {
        if (heartbeatInterval) {
            clearInterval(heartbeatInterval);
            heartbeatInterval = null;
            console.log('[HEARTBEAT] Stopped');
        }
    }

    // Запускаем heartbeat после загрузки страницы
    window.addEventListener('load', startHeartbeat);
    
    // Останавливаем при закрытии страницы
    window.addEventListener('beforeunload', stopHeartbeat);
    </script>

    <script src="{{ url_for('static', filename='js/visible_persons.js') }}?v=20260313-37"></script>
    <script src="{{ url_for('static', filename='js/undo.js') }}?v=20260313-37"></script>
    <script src="{{ url_for('static', filename='js/tree.js') }}?v=20260313-37"></script>

    <!-- Модальное окно для загрузки фото -->
    <div id="photo-upload-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h3>📷 Загрузка фото</h3>
                <span class="modal-close" onclick="closePhotoModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="photo-person-name" style="margin-bottom:15px;font-weight:bold;"></p>
                <input type="file" id="photo-file-input" accept="image/*" style="display:block;margin:10px 0;">
                <div id="photo-preview" style="margin:10px 0;text-align:center;"></div>
                <div id="photo-error" style="color:red;margin:10px 0;"></div>
                <button type="button" id="photo-upload-btn" class="btn-primary" style="width:100%;padding:10px;">
                    💾 Сохранить фото
                </button>
            </div>
        </div>
    </div>

    <style>
    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal-content {
        background: white;
        border-radius: 8px;
        max-width: 500px;
        width: 90%;
        max-height: 90vh;
        overflow: auto;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #e5e7eb;
    }
    .modal-header h3 { margin: 0; }
    .modal-close {
        font-size: 24px;
        cursor: pointer;
        color: #6b7280;
    }
    .modal-close:hover { color: #111827; }
    .modal-body { padding: 15px; }
    .btn-primary {
        background: #1e40af;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    .btn-primary:hover { background: #1e3a8a; }
    </style>

    <script>
    // Фото-модалка
    let currentPhotoPersonId = null;
    let currentPhotoPersonName = null;

    function openPhotoModal(personId, personName) {
        currentPhotoPersonId = personId;
        currentPhotoPersonName = personName;
        document.getElementById('photo-person-name').textContent = personName;
        document.getElementById('photo-file-input').value = '';
        document.getElementById('photo-preview').innerHTML = '';
        document.getElementById('photo-error').textContent = '';
        document.getElementById('photo-upload-modal').style.display = 'flex';
    }

    function closePhotoModal() {
        document.getElementById('photo-upload-modal').style.display = 'none';
        currentPhotoPersonId = null;
        currentPhotoPersonName = null;
    }

    // Предпросмотр фото
    document.getElementById('photo-file-input')?.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = document.createElement('img');
            img.src = event.target.result;
            img.style.maxWidth = '100%';
            img.style.maxHeight = '200px';
            document.getElementById('photo-preview').innerHTML = '';
            document.getElementById('photo-preview').appendChild(img);
        };
        reader.readAsDataURL(file);
    });

    // Загрузка фото
    document.getElementById('photo-upload-btn')?.addEventListener('click', async function() {
        const fileInput = document.getElementById('photo-file-input');
        const file = fileInput.files[0];
        const errorDiv = document.getElementById('photo-error');

        if (!file) {
            errorDiv.textContent = 'Выберите файл';
            return;
        }

        // Читаем файл как base64
        const reader = new FileReader();
        reader.onload = async function(event) {
            const base64 = event.target.result.split(',')[1];  // Убираем data:image/...;base64,

            try {
                const response = await fetch(`/api/photo/${currentPhotoPersonId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        photo: base64,
                        photo_path: file.name
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`✅ Фото сохранено! (${result.size} KB)`);
                    closePhotoModal();
                    // Перезагружаем дерево
                    if (typeof loadTree === 'function') loadTree();
                } else {
                    errorDiv.textContent = result.error || 'Ошибка загрузки';
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка: ' + error.message;
            }
        };
        reader.onerror = () => {
            errorDiv.textContent = 'Ошибка чтения файла';
        };
        reader.readAsDataURL(file);
    });

    // Закрытие по клику вне модалки
    document.getElementById('photo-upload-modal')?.addEventListener('click', function(e) {
        if (e.target === this) closePhotoModal();
    });
    </script>
</body>
