<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация — Семейное древо</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Регистрация</h1>
        <div id="error" class="error" style="color: red; margin: 10px 0;"></div>
        <form id="registerForm">
            <label>Логин</label>
            <input type="text" name="login" id="login" value="{{ login or '' }}" required autofocus>
            <label>Пароль</label>
            <input type="password" name="password" id="password" required minlength="4">
            <label>Повторите пароль</label>
            <input type="password" name="password2" id="password2" required minlength="4">
            <div class="auth-buttons">
                <button type="submit">Зарегистрироваться</button>
                <a href="{{ url_for('login') }}" class="btn-link">Назад к входу</a>
            </div>
        </form>
    </div>
    
    <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;
        const errorDiv = document.getElementById('error');
        
        if (password !== password2) {
            errorDiv.textContent = 'Пароли не совпадают';
            return;
        }
        
        errorDiv.textContent = 'Регистрация...';
        
        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    login: login,
                    password: password
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                // Успех — перенаправляем на вход
                window.location.href = '/login';
            } else {
                errorDiv.textContent = data.error || data.message || 'Ошибка регистрации';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка подключения к серверу';
            console.error(err);
        }
    });
    </script>
</body>
</html>
