<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e40af">
    <title>Регистрация — Семейное древо</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Регистрация</h1>
        <div id="error" class="error" style="color: red; margin: 10px 0;"></div>

        <form id="registerForm">
            <label>Логин *</label>
            <input type="text" name="login" id="login" value="{{ login or '' }}" required autofocus placeholder="Придумайте логин">

            <label>Email *</label>
            <input type="email" name="email" id="email" required placeholder="your@gmail.com">

            <label>Пароль *</label>
            <input type="password" name="password" id="password" required minlength="4" placeholder="Минимум 4 символа">

            <label>Повторите пароль *</label>
            <input type="password" name="password2" id="password2" required minlength="4" placeholder="Повторите пароль">

            <div class="auth-buttons">
                <button type="submit">Зарегистрироваться</button>
                <a href="{{ url_for('login') }}" class="btn-link">Назад к входу</a>
            </div>
        </form>
    </div>

    <script>
    const SYNC_SERVER_URL = 'https://ravishing-caring-production-3656.up.railway.app';

    const registerForm = document.getElementById('registerForm');
    const errorDiv = document.getElementById('error');

    registerForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const login = document.getElementById('login').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            errorDiv.textContent = 'Пароли не совпадают';
            return;
        }

        if (password.length < 4) {
            errorDiv.textContent = 'Пароль должен быть не менее 4 символов';
            return;
        }

        errorDiv.textContent = 'Регистрация...';

        try {
            const response = await fetch(SYNC_SERVER_URL + '/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({login: login, password: password, email: email})
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = '/login?registered=1';
            } else {
                errorDiv.textContent = data.error || 'Ошибка регистрации';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка подключения к серверу';
            console.error(err);
        }
    });
    </script>
</body>
</html>
