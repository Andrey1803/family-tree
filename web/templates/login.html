<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — Семейное древо</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Семейное древо</h1>
        <h2>Вход</h2>
        <div id="error" class="error" style="color: red; margin: 10px 0;"></div>
        <form id="loginForm">
            <label>Логин</label>
            <input type="text" name="login" id="login" value="{{ login or '' }}" required autofocus>
            <label>Пароль</label>
            <input type="password" name="password" id="password" required>
            <div class="auth-buttons">
                <button type="submit">Войти</button>
                <a href="{{ url_for('register') }}" class="btn-link">Регистрация</a>
            </div>
        </form>
        <form method="post" action="{{ url_for('login') }}" class="guest-form">
            <input type="hidden" name="guest" value="1">
            <button type="submit" class="btn-guest">Войти без регистрации</button>
        </form>
    </div>
    
    <script>
    // URL сервера синхронизации
    const SYNC_SERVER_URL = 'https://ravishing-caring-production-3656.up.railway.app';
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');
        
        errorDiv.textContent = 'Вход...';
        
        try {
            const response = await fetch(SYNC_SERVER_URL + '/api/auth/login', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    login: login,
                    password: password
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.token) {
                // Успех — отправляем токен на сервер для сохранения в сессии
                const sessionResp = await fetch('/api/auth/session', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token: data.token, user_id: data.user_id})
                });
                
                if (sessionResp.ok) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = 'Ошибка сохранения сессии';
                }
            } else {
                errorDiv.textContent = data.error || data.message || 'Неверный логин или пароль';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка подключения к серверу';
            console.error(err);
        }
    });
    </script>
</body>
</html>
