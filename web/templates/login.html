<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e40af">
    <title>Вход — Семейное древо</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Семейное древо</h1>
        <h2>Вход</h2>
        <div id="error" class="error" style="color: red; margin: 10px 0;"></div>
        <form id="loginForm">
            <label>Логин</label>
            <input type="text" name="login" id="login" value="{{ login or '' }}" required autofocus autocomplete="username">
            <label>Пароль</label>
            <input type="password" name="password" id="password" required autocomplete="current-password">
            <div class="auth-buttons">
                <button type="submit">Войти</button>
                <a href="{{ url_for('register') }}" class="btn-link">Регистрация</a>
            </div>
        </form>
    </div>
    
    <script>
    localStorage.removeItem('family_tree_backup');
    localStorage.removeItem('family_tree_username');

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');

        errorDiv.textContent = 'Вход...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({login: login, password: password})
            });

            const data = await response.json();

            if (response.ok && data.ok) {
                localStorage.setItem('family_tree_username', login);
                window.location.href = '/?login=success';
            } else {
                errorDiv.textContent = data.error || 'Неверный логин или пароль';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка подключения к серверу';
        }
    });
    </script>
</body>
</html>
